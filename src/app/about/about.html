<section>
   <h2>{{ pageTitle }}</h2>

   <div [ngSwitch]="courseType" class="info-block">
      <ng-template ngSwitchCase="'all'">
         <p>📚 Все курсы нашей платформы</p>
      </ng-template>
      <ng-template ngSwitchCase="'popular'">
         <p>🔥 Самые популярные курсы</p>
      </ng-template>
      <ng-template ngSwitchDefault>
         <p>💰 Курсы по финансовой грамотности</p>
      </ng-template>
   </div>

   <div class="demo-section">
      <h3>Демонстрация ngIf с then/else:</h3>
      <button (click)="toggle()">Показать/скрыть описание</button>

      <ng-template [ngIf]="condition" [ngIfThen]="thenBlock" [ngIfElse]="elseBlock"></ng-template>
      <ng-template #thenBlock>
         <p class="demo-then">✅ Все курсы доступны для изучения</p>
      </ng-template>
      <ng-template #elseBlock>
         <p class="demo-else">⏳ Курсы скоро откроются</p>
      </ng-template>
   </div>

   <div class="courses-grid">
      <app-course-card *ngFor="let course of courses; index as i" [course]="course" [index]="i">
      </app-course-card>
   </div>
</section>
